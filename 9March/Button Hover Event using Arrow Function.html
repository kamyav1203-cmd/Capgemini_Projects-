<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Hover Event using Arrow Function</title>
</head>
<body>
    <button id="submitBtn">Submit</button>
    <p id="message"></p>

    <script>
        document.getElementById("submitBtn").addEventListener("mouseover", () => {
            console.log("Mouse hovered over submit button");
            document.getElementById("message").textContent = "Mouse hovered over submit button";
        });
    </script>
</body>
</html>
