<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Price Update</title>
</head>
<body>
    <h2>E-Commerce Price Update</h2>
    <script>
        const prices = [1200, 800, 1500, 2000];

        const discountedPrices = prices.map(price => price * 0.9);

        console.log(discountedPrices); // [1080, 720, 1350, 1800]
    </script>
</body>
</html>
