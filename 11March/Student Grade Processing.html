<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Processing</title>
</head>
<body>
    <h2>Student Grade Processing</h2>
    <script>
        const marks = [65, 70, 80, 55, 90];

        const updatedMarks = marks.map(mark => mark + 5);

        console.log(updatedMarks); // [70, 75, 85, 60, 95]
    </script>
</body>
</html>
