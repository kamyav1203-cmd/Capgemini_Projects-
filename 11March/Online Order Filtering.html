<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Order Filtering</title>
</head>
<body>
    <h2>Online Order Filtering</h2>
    <script>
        const orders = [450, 1200, 700, 3000, 1500];

        const highValueOrders = orders.filter(order => order > 1000);

        console.log(highValueOrders); // [1200, 3000, 1500]
    </script>
</body>
</html>
