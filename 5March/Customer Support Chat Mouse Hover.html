<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chat Mouse Hover</title>
</head>
<body>

    <div id="chatIcon">💬 Chat Support</div>
    <p id="info"></p>

    <script>
        document.getElementById("chatIcon").addEventListener("mouseover", function() {
            document.getElementById("info").innerText = "Click here to talk with customer support";
            console.log("Mouse hovered over chat icon");
        });
    </script>

</body>
</html>
